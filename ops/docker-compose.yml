version: "3.8"

services:
  # MQTT 服务器：设备通信与数据流的中心枢纽
  emqx:
    image: emqx/emqx:5.1.0
    container_name: msm_emqx
    ports:
      - "1883:1883" # MQTT/TCP 端口
      - "8083:8083" # MQTT/WebSocket 端口 (可用于前端)
      - "18083:18083" # EMQX 管理控制台端口
    environment:
      - "EMQX_DASHBOARD__DEFAULT_USERNAME=admin"
      - "EMQX_DASHBOARD__DEFAULT_PASSWORD=public"
    restart: always

  # InfluxDB: 专为工业物联网设计的时序数据库，存储微震、位移高频数据
  influxdb:
    image: influxdb:2.7
    container_name: msm_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=mining
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    restart: always

  # MySQL: 存储业务类数据（设备台账、用户权限、预警工单）
  mysql:
    image: mysql:8.0
    container_name: msm_mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=mining_system
      - MYSQL_USER=msm_user
      - MYSQL_PASSWORD=msm_pass
    restart: always

  # Zookeeper (Kafka 依赖)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: msm_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  # Kafka: 数据工业生命线，处理大并发流数据
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: msm_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  # ==========================================================
  # DomeShield Microservices Architecture
  # ==========================================================

  # [1] 前端静态资源 (Nginx)
  frontend_web:
    build:
      context: ../frontend_dashboard
      dockerfile: Dockerfile
    container_name: msm_frontend
    ports:
      - "80:80"
    depends_on:
      - api-server
      - business-api
    restart: always

  # [2] 数据桥接服务 (MQTT -> InfluxDB/Kafka)
  data-ingestion:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: msm_data_ingestion
    command: ["python", "backend_service/data_ingestion.py"]
    depends_on:
      - emqx
      - influxdb
      - kafka
    restart: always

  # [3] 核心 API 网关 (端口 8000)
  api-server:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: msm_api_server
    command: ["uvicorn", "backend_service.api_server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      - data-ingestion
    restart: always

  # [4] 业务权限与后台管理 API (端口 8002)
  business-api:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: msm_business_api
    command: ["uvicorn", "backend_service.business_api:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    depends_on:
      - mysql
    volumes:
      - ../backend_service/mining.db:/app/backend_service/mining.db  # 挂载本地 SQLite 方便不丢数据
    restart: always

  # [5] 时序 AI 推理节点 (端口 8001)
  ai-ts-engine:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: msm_ai_ts
    command: ["python", "backend_service/ai_prediction_engine.py"]
    ports:
      - "8001:8001"
    restart: always

  # [6] 视觉 AI 边缘推理节点 (端口 8003)
  ai-vision-engine:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: msm_ai_vision
    command: ["python", "ai_core/vision_inference_service.py"]
    ports:
      - "8003:8003"
    volumes:
      - ../ai_core/results:/app/ai_core/results  # CV 测试结果需导出
    restart: always
