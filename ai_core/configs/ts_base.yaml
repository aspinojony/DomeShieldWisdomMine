# 模型通用配置
experiment_name: "MultiSensor_LSTM_V1"
device: "mps" # Mac Silicon 加速

dataset:
  # 历史数据窗口大小，例如过去 60 个时间步 (如果 1分钟1个，则为 1 小时)
  seq_len: 60
  # 预测未来多少步
  pred_len: 6
  # 输入传感器特征数量: crack_width, seismic_energy, angle_x, settlement_mm
  input_dim: 4
  # 合成训练数据存放路径
  csv_path: "./data/synthetic_sensor_data.csv"
  batch_size: 64

model:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2

training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 8
  save_dir: "./checkpoints/"
